<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spendex — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css" />
  <!-- theme.js runs immediately to avoid flash -->
  <script src="theme.js"></script>
</head>
<body>

  <header class="auth-header">
    <div class="auth-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">Spendex</span>
    </div>
    <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </header>

  <div class="auth-wrapper">

    <!-- SIGNUP -->
    <div id="signup-box" class="auth-card">
      <div class="auth-card-icon">◈</div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-sub">Start tracking your expenses</p>

      <div class="field-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="e.g. diplekha" class="auth-input" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" class="auth-input" />
      </div>

      <button class="auth-btn" onclick="signup()">Create Account</button>

      <p class="auth-switch">
        Already have an account?
        <span onclick="showLogin()">Login</span>
      </p>
    </div>

    <!-- LOGIN -->
    <div id="login-box" class="auth-card" style="display:none;">
      <div class="auth-card-icon">◈</div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Login to your Spendex account</p>

      <div class="field-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Your username" class="auth-input" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password" class="auth-input" />
      </div>

      <button class="auth-btn" onclick="login()">Login</button>

      <p class="auth-switch">
        Don't have an account?
        <span onclick="showSignup()">Sign Up</span>
      </p>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="theme.js"></script>
  <script src="auth.js"></script>
</body>
</html>
